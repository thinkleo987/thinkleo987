<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Azure & Cloud Architecture Hub — thinkleo987</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css" integrity="sha512-+R0eEwD8i1z6m1P3h4hYz0iI3l5qjEo0sFqv0QxqP6YxYpE7m1Y9pTgqP1y3nF6V2Qm8KJYQe7b5a2K1l3ZKQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial; padding: 20px; background: #f6f8fa; }
    .container { max-width: 960px; margin: 0 auto; }
    .markdown-body { box-shadow: 0 1px 3px rgba(27,31,35,0.12); background: #fff; padding: 30px; border-radius: 6px; }
    header { margin-bottom: 16px; }
    .meta { color: #586069; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Azure & Cloud Architecture Hub</h1>
      <p class="meta">A comprehensive resource for cloud architecture, best practices, and enterprise Azure solutions</p>
    </header>

    <main id="content" class="markdown-body">
      <p>Loading content…</p>
    </main>

    <footer style="margin-top:20px;color:#6a737d;font-size:13px">
      <p>Rendered from <code>README.md</code></p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    async function renderReadme() {
      try {
        const resp = await fetch('/README.md');
        if (!resp.ok) throw new Error('Could not fetch README.md');
        const md = await resp.text();
        const html = marked.parse(md, { gfm: true, breaks: true });
        document.getElementById('content').innerHTML = html;
        // Make relative links open correctly
        const links = document.getElementById('content').querySelectorAll('a');
        links.forEach(a => {
          const href = a.getAttribute('href');
          if (href && href.startsWith('./')) a.setAttribute('href', href.replace('./',''));
        });
      } catch (err) {
        document.getElementById('content').innerHTML = '<p>Failed to load README.md — ' + err.message + '</p>';
      }
    }
    renderReadme();
  </script>
</body>
</html>
