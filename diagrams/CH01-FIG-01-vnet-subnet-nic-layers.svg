<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" width="1100" height="620" role="img" aria-labelledby="fig01-title fig01-desc" font-family="Segoe UI, sans-serif">
  <title id="fig01-title">Figure 1.1 — Azure Virtual Network anatomy</title>
  <desc id="fig01-desc">Diagram showing an Azure subscription containing a resource group, which contains a VNet with address space 10.10.0.0/16. Inside the VNet are three subnets: GatewaySubnet at 10.10.0.0/26, snet-app-prod at 10.10.1.0/24, and snet-data-prod at 10.10.2.0/24. A virtual machine in snet-app-prod is connected via a NIC with static private IP 10.10.1.4.</desc>

  <!-- Background -->
  <rect width="1100" height="620" fill="#FFFFFF"/>

  <!-- ═══════════════════════════════════════════════
       AZURE SUBSCRIPTION (outermost, dashed border)
  ════════════════════════════════════════════════ -->
  <rect x="20" y="20" width="1060" height="570" rx="8" ry="8"
        fill="#F8F9FA" stroke="#6C757D" stroke-width="1.5" stroke-dasharray="8,4"/>
  <!-- Subscription label -->
  <rect x="20" y="20" width="180" height="26" rx="4" fill="#6C757D"/>
  <text x="110" y="37" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="600">Azure Subscription</text>

  <!-- ═══════════════════════════════════════════════
       RESOURCE GROUP (solid border, inside subscription)
  ════════════════════════════════════════════════ -->
  <rect x="44" y="64" width="1012" height="506" rx="6" ry="6"
        fill="#EEF2F7" stroke="#ADB5BD" stroke-width="1.5"/>
  <!-- Resource Group label pill -->
  <rect x="44" y="64" width="265" height="24" rx="4" fill="#ADB5BD"/>
  <text x="176" y="80" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="600">Resource Group — rg-network-prod-eus2-001</text>

  <!-- ═══════════════════════════════════════════════
       VNET (azure blue border)
  ════════════════════════════════════════════════ -->
  <rect x="68" y="106" width="964" height="444" rx="6" ry="6"
        fill="#E8F4FD" stroke="#0078D4" stroke-width="2"/>
  <!-- VNet label pill -->
  <rect x="68" y="106" width="340" height="24" rx="4" fill="#0078D4"/>
  <text x="238" y="122" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="600">VNet — vnet-hub-prod-eus2-001</text>
  <text x="440" y="122" text-anchor="middle" fill="#0078D4" font-size="10" font-weight="600" font-family="Cascadia Code, Courier New, monospace">10.10.0.0/16</text>

  <!-- ═══════════════════════════════════════════════
       SUBNET 1: GatewaySubnet (light grey fill)
  ════════════════════════════════════════════════ -->
  <rect x="92" y="148" width="260" height="378" rx="5" ry="5"
        fill="#E9ECEF" stroke="#868E96" stroke-width="1.5"/>
  <!-- Subnet label -->
  <text x="222" y="170" text-anchor="middle" fill="#343A40" font-size="11" font-weight="600">GatewaySubnet</text>
  <text x="222" y="186" text-anchor="middle" fill="#495057" font-size="9" font-weight="400" font-family="Cascadia Code, Courier New, monospace">10.10.0.0/26</text>
  <text x="222" y="200" text-anchor="middle" fill="#6C757D" font-size="9">Min /27 · APAF rec /26</text>

  <!-- VPN Gateway icon (simple representation) -->
  <g transform="translate(198,228)">
    <!-- Gateway icon: shield-like shape -->
    <rect x="0" y="0" width="48" height="48" rx="4" fill="#0078D4" opacity="0.12"/>
    <!-- VPN Gateway symbol -->
    <path d="M24,8 L38,16 L38,32 L24,40 L10,32 L10,16 Z" fill="none" stroke="#0078D4" stroke-width="2"/>
    <line x1="24" y1="8" x2="24" y2="40" stroke="#0078D4" stroke-width="1.5"/>
    <line x1="10" y1="24" x2="38" y2="24" stroke="#0078D4" stroke-width="1.5"/>
  </g>
  <text x="222" y="290" text-anchor="middle" fill="#0078D4" font-size="10" font-weight="600">VPN / ER Gateway</text>
  <text x="222" y="304" text-anchor="middle" fill="#6C757D" font-size="9">Platform-managed</text>

  <!-- Reserved note -->
  <rect x="106" y="490" width="234" height="22" rx="3" fill="#DEE2E6"/>
  <text x="223" y="505" text-anchor="middle" fill="#495057" font-size="9" font-style="italic">No VMs · No NSG default route</text>

  <!-- ═══════════════════════════════════════════════
       SUBNET 2: snet-app-prod (light blue fill)
  ════════════════════════════════════════════════ -->
  <rect x="376" y="148" width="370" height="378" rx="5" ry="5"
        fill="#D0E8F8" stroke="#0078D4" stroke-width="1.5" opacity="0.85"/>
  <!-- Subnet label -->
  <text x="561" y="170" text-anchor="middle" fill="#004578" font-size="11" font-weight="600">snet-app-prod</text>
  <text x="561" y="186" text-anchor="middle" fill="#004578" font-size="9" font-family="Cascadia Code, Courier New, monospace">10.10.1.0/24</text>
  <text x="561" y="200" text-anchor="middle" fill="#0078D4" font-size="9">251 usable · Dynamic + Static</text>

  <!-- ── VM ── -->
  <!-- VM outer box -->
  <rect x="430" y="218" width="130" height="110" rx="5" fill="#FFFFFF" stroke="#0078D4" stroke-width="1.5"/>
  <!-- VM icon (server shape) -->
  <rect x="454" y="226" width="48" height="38" rx="3" fill="#0078D4" opacity="0.15"/>
  <rect x="454" y="226" width="48" height="38" rx="3" fill="none" stroke="#0078D4" stroke-width="1.5"/>
  <line x1="454" y1="239" x2="502" y2="239" stroke="#0078D4" stroke-width="1"/>
  <line x1="454" y1="249" x2="502" y2="249" stroke="#0078D4" stroke-width="1"/>
  <circle cx="460" cy="233" r="2" fill="#0078D4"/>
  <circle cx="467" cy="233" r="2" fill="#0078D4"/>
  <text x="478" y="280" text-anchor="middle" fill="#004578" font-size="10" font-weight="600">vm-app-prod-001</text>
  <text x="478" y="294" text-anchor="middle" fill="#6C757D" font-size="9">Standard_D2s_v5</text>
  <text x="478" y="308" text-anchor="middle" fill="#6C757D" font-size="9">Ubuntu 22.04</text>

  <!-- Arrow from VM down to NIC -->
  <line x1="478" y1="328" x2="478" y2="360" stroke="#0078D4" stroke-width="1.5"/>
  <polygon points="478,360 473,350 483,350" fill="#0078D4"/>

  <!-- ── NIC ── -->
  <rect x="410" y="362" width="168" height="90" rx="5" fill="#FFFFFF" stroke="#107C10" stroke-width="1.5"/>
  <!-- NIC icon -->
  <rect x="430" y="372" width="36" height="24" rx="2" fill="#107C10" opacity="0.15"/>
  <rect x="430" y="372" width="36" height="24" rx="2" fill="none" stroke="#107C10" stroke-width="1.5"/>
  <line x1="430" y1="381" x2="466" y2="381" stroke="#107C10" stroke-width="1"/>
  <line x1="430" y1="387" x2="466" y2="387" stroke="#107C10" stroke-width="1"/>
  <text x="494" y="380" fill="#107C10" font-size="10" font-weight="600">NIC</text>
  <text x="494" y="393" fill="#495057" font-size="9">nic-vm-app-prod-001</text>
  <text x="430" y="418" fill="#495057" font-size="9">IP Config: primary</text>
  <text x="430" y="431" fill="#004578" font-size="9" font-family="Cascadia Code, Courier New, monospace">10.10.1.4 (static)</text>
  <text x="590" y="431" fill="#107C10" font-size="9" font-weight="600">Private</text>

  <!-- Arrow from NIC down to subnet boundary indicator -->
  <line x1="478" y1="452" x2="478" y2="478" stroke="#107C10" stroke-width="1.5"/>
  <polygon points="478,478 473,468 483,468" fill="#107C10"/>
  <text x="561" y="495" text-anchor="middle" fill="#004578" font-size="9" font-style="italic">Subnet boundary</text>

  <!-- Five reserved IPs callout -->
  <rect x="390" y="500" width="342" height="18" rx="3" fill="#CCE5FF"/>
  <text x="561" y="513" text-anchor="middle" fill="#004578" font-size="9" font-weight="400">5 reserved: .0 .1 .2 .3 .255  ·  First assignable: </text>
  <tspan font-family="Cascadia Code, Courier New, monospace" font-size="9" fill="#004578">10.10.1.4</tspan>

  <!-- ═══════════════════════════════════════════════
       SUBNET 3: snet-data-prod (light blue fill)
  ════════════════════════════════════════════════ -->
  <rect x="770" y="148" width="238" height="378" rx="5" ry="5"
        fill="#D0E8F8" stroke="#0078D4" stroke-width="1.5" opacity="0.85"/>
  <!-- Subnet label -->
  <text x="889" y="170" text-anchor="middle" fill="#004578" font-size="11" font-weight="600">snet-data-prod</text>
  <text x="889" y="186" text-anchor="middle" fill="#004578" font-size="9" font-family="Cascadia Code, Courier New, monospace">10.10.2.0/24</text>
  <text x="889" y="200" text-anchor="middle" fill="#0078D4" font-size="9">251 usable</text>

  <!-- Database icon -->
  <g transform="translate(865,228)">
    <ellipse cx="24" cy="14" rx="22" ry="8" fill="#0078D4" opacity="0.15" stroke="#0078D4" stroke-width="1.5"/>
    <rect x="2" y="14" width="44" height="28" fill="#0078D4" opacity="0.08"/>
    <line x1="2" y1="14" x2="2" y2="42" stroke="#0078D4" stroke-width="1.5"/>
    <line x1="46" y1="14" x2="46" y2="42" stroke="#0078D4" stroke-width="1.5"/>
    <ellipse cx="24" cy="42" rx="22" ry="8" fill="#E8F4FD" stroke="#0078D4" stroke-width="1.5"/>
    <ellipse cx="24" cy="28" rx="22" ry="8" fill="none" stroke="#0078D4" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
  <text x="889" y="296" text-anchor="middle" fill="#0078D4" font-size="10" font-weight="600">SQL / Data Tier</text>
  <text x="889" y="310" text-anchor="middle" fill="#6C757D" font-size="9">Private endpoint ready</text>

  <!-- Private endpoint indicator -->
  <rect x="800" y="490" width="178" height="22" rx="3" fill="#E2F0D9"/>
  <text x="889" y="505" text-anchor="middle" fill="#375623" font-size="9" font-style="italic">PE: 1 IP consumed per endpoint</text>

  <!-- ═══════════════════════════════════════════════
       CONNECTIVITY ARROWS between subnets (within VNet)
  ════════════════════════════════════════════════ -->
  <!-- GatewaySubnet <-> snet-app (system route) -->
  <line x1="352" y1="337" x2="376" y2="337" stroke="#0078D4" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <polygon points="376,337 366,332 366,342" fill="#0078D4" opacity="0.6"/>
  <text x="364" y="328" text-anchor="middle" fill="#0078D4" font-size="8" opacity="0.8">system route</text>

  <!-- snet-app <-> snet-data (system route) -->
  <line x1="746" y1="337" x2="770" y2="337" stroke="#0078D4" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <polygon points="770,337 760,332 760,342" fill="#0078D4" opacity="0.6"/>
  <line x1="746" y1="337" x2="750" y2="337" stroke="#0078D4" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <polygon points="746,337 756,332 756,342" fill="#0078D4" opacity="0.6"/>
  <text x="758" y="328" text-anchor="middle" fill="#0078D4" font-size="8" opacity="0.8">system route</text>

  <!-- ═══════════════════════════════════════════════
       LEGEND
  ════════════════════════════════════════════════ -->
  <rect x="68" y="558" width="964" height="1" fill="#DEE2E6"/>
  <!-- Legend items -->
  <rect x="80" y="572" width="12" height="12" rx="2" fill="#E9ECEF" stroke="#868E96" stroke-width="1.5"/>
  <text x="98" y="582" fill="#495057" font-size="9">Special-purpose subnet (grey)</text>

  <rect x="240" y="572" width="12" height="12" rx="2" fill="#D0E8F8" stroke="#0078D4" stroke-width="1.5"/>
  <text x="258" y="582" fill="#495057" font-size="9">Application / data subnet (blue)</text>

  <line x1="440" y1="578" x2="465" y2="578" stroke="#0078D4" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="470" y="582" fill="#495057" font-size="9">System route (VirtualNetwork)</text>

  <rect x="640" y="572" width="12" height="12" rx="2" fill="none" stroke="#0078D4" stroke-width="2"/>
  <text x="658" y="582" fill="#495057" font-size="9">VNet boundary</text>

  <rect x="760" y="572" width="12" height="12" rx="2" fill="none" stroke="#107C10" stroke-width="1.5"/>
  <text x="778" y="582" fill="#495057" font-size="9">NIC (network interface card)</text>

  <!-- ═══════════════════════════════════════════════
       FIGURE CAPTION
  ════════════════════════════════════════════════ -->
  <text x="550" y="610" text-anchor="middle" fill="#495057" font-size="11" font-style="italic">
    Figure 1.1 — Azure Virtual Network anatomy: subscription scope, VNet address space, subnets, and NIC attachment
  </text>
</svg>
